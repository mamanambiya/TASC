# Markdownlint configuration for GA4GH TASC repository
# Prose-heavy documentation project — disable rules that conflict with long-form writing

# Disable line length — prose documents naturally exceed 80 chars
MD013: false

# Allow both dash and asterisk for unordered lists (existing docs use both)
MD004: false

# Allow flexible list indentation (3-space indent used in ADRs)
MD007: false

# Allow ordered lists with sequential numbering (1. 2. 3.) not just (1. 1. 1.)
MD029:
  style: ordered

# Allow headings without surrounding blank lines in metadata blocks
MD022: false

# Allow lists without surrounding blank lines (common in ADR consequence sections)
MD032: false

# Allow inline HTML (used in some recommendation tables)
MD033: false

# Allow duplicate headings (e.g. "Parameters" under different parent sections)
MD024: false

# Allow multiple top-level headings (some docs use bold text parsed as h1)
MD025: false

# Disable table column style — compact vs padded varies across docs
MD060: false

# Allow bare URLs in reference sections
MD034: false
